<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Iluminación</title>
  <link rel="stylesheet" href="estilos.css">
  <script src="script.js" defer></script>
</head>
<body>

  <div class="contenedor">

    <h1>Iluminación</h1>

    <div class="barra-superior">
      <h2>Iluminación Casa 1</h2>
      <div class="zona-actualizar">
        <span id="mensaje-error" class="mensaje-error"></span>
        <button id="btn-actualizar" class="btn">Actualizar</button>
      </div>
    </div>

    <div class="caja-luces">

      <div class="luces">

        <div class="tarjeta-luz">
          <div class="circulo rojo"></div>
          <p>Led Rojo</p>
          <div class="interruptor">
            <input type="checkbox" id="casilla-led-roja">
          </div>
        </div>

        <div class="tarjeta-luz">
          <div class="circulo amarillo"></div>
          <p>Led Amarillo</p>
          <div class="interruptor">
            <input type="checkbox" id="casilla-led-amarilla">
          </div>
        </div>

        <div class="tarjeta-luz">
          <div class="circulo verde"></div>
          <p>Led Verde</p>
          <div class="interruptor">
            <input type="checkbox" id="casilla-led-verde">
          </div>
        </div>

        <div class="tarjeta-luz">
          <div class="circulo blanco"></div>
          <p>Led Puerta</p>
          <div class="interruptor">
            <input type="checkbox" id="casilla-led-puerta">
          </div>
        </div>

        <div class="tarjeta-luz">
          <div class="circulo led-rgb"></div>
          <p>Led RGB</p>
          <div class="controles-rgb">
            <input type="color" id="selector-color" value="#8d6e63">
            <div class="interruptor">
              <input type="checkbox" id="casilla-led-rgb">
            </div>
          </div>
        </div>

      </div>

      <div class="botones-inferiores">
        <button id="btn-encender-todo" class="btn">Encender Todo</button>
        <button id="btn-apagar-todo" class="btn">Apagar Todo</button>
      </div>

    </div>

  </div>

</body>
</html>
